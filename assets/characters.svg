    <path d="M25 20 L30 35 L35 20" stroke="#2980b9" stroke-width="4" fill="none"/>
    <circle cx="25" cy="18" r="4" fill="#ecf0f1"/>
    <circle cx="35" cy="18" r="4" fill="#ecf0f1"/>
    <circle cx="30" cy="40" r="5" fill="#ecf0f1"/>
