    <rect x="30" y="45" width="40" height="10" fill="#34495e"/>
    <rect x="30" y="60" width="40" height="10" fill="#34495e"/>
    <rect x="30" y="75" width="40" height="5" fill="#34495e"/>
    <rect x="35" y="10" width="30" height="25" rx="3" fill="#5d6d7e"/>
    <rect x="38" y="15" width="24" height="15" fill="#2c3e50"/>
    <rect x="42" y="18" width="6" height="6" fill="#e74c3c"/>
    <rect x="52" y="18" width="6" height="6" fill="#e74c3c"/>
