<!-- 波波拳角色 SVG 素材 -->
<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  
  <!-- 1. 波波 - 充气大师 -->
  <symbol id="char-bobo" viewBox="0 0 100 100">
