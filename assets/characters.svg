    <line x1="24" y1="32" x2="36" y2="32" stroke="#2ecc71" stroke-width="2"/>
    <line x1="24" y1="38" x2="32" y2="38" stroke="#2ecc71" stroke-width="2"/>
  </symbol>

  <!-- 大招图标 -->
