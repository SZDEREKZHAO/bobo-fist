  <symbol id="super-shield" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="25" fill="#3498db"/>
    <path d="M30 12 Q45 12 45 30 Q45 48 30 52 Q15 48 15 30 Q15 12 30 12" fill="#2980b9"/>
    <path d="M30 18 Q40 18 40 30 Q40 44 30 46 Q20 44 20 30 Q20 18 30 18" fill="#5dade2"/>
  </symbol>

  <symbol id="super-steal" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="25" fill="#9b59b6"/>
    <path d="M20 25 Q30 15 40 25 Q40 35 30 40 Q20 35 20 25" fill="#8e44ad"/>
    <circle cx="30" cy="28" r="5" fill="#f39c12"/>
    <path d="M30 35 L30 45" stroke="#f39c12" stroke-width="3"/>
    <path d="M25 40 L35 40" stroke="#f39c12" stroke-width="3"/>
  </symbol>

</svg>