    <ellipse cx="50" cy="45" rx="8" ry="5" fill="#ff8fab"/>
    <ellipse cx="25" cy="55" rx="8" ry="12" fill="#ffd93d"/>
    <ellipse cx="75" cy="55" rx="8" ry="12" fill="#ffd93d"/>
  </symbol>

